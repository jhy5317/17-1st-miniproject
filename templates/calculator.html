<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="원화와 주요 외화 사이의 환율을 계산합니다."
    />
    <title>환율 계산기 | Korea Exchange</title>
    <link
      rel="icon"
      type="image/png"
      href="{{ url_for('static', filename='favicon.png') }}"
    />
    <script src="https://cdn.tailwindcss.com"></script>
  </head>

  <body class="min-h-screen bg-slate-950 text-white antialiased">
    <div class="relative isolate min-h-screen overflow-hidden">
      <div
        class="absolute -left-32 -top-32 h-96 w-96 rounded-full bg-emerald-500/20 blur-3xl"
      ></div>
      <div
        class="absolute -right-20 top-32 h-80 w-80 rounded-full bg-cyan-400/10 blur-3xl"
      ></div>

      <header class="relative mx-auto max-w-5xl px-4 sm:px-6 lg:px-8">
        <nav
          class="flex items-center justify-between border-b border-white/10 py-5"
        >
          <a
            href="{{ url_for('index') }}"
            class="text-sm font-semibold text-emerald-400"
            >← 주요 환율로 돌아가기</a
          >
          <a
            href="{{ url_for('rates') }}"
            class="text-sm font-semibold text-slate-300 transition hover:text-emerald-300"
            >전체 환율 보기</a
          >
        </nav>
      </header>

      <main
        class="relative mx-auto max-w-5xl px-4 py-14 sm:px-6 lg:px-8 lg:py-20"
      >
        <div class="mx-auto max-w-3xl">
          <p
            class="text-sm font-bold uppercase tracking-[0.24em] text-emerald-400"
          >
            Currency converter
          </p>
          <h1 class="mt-3 text-4xl font-black tracking-tight sm:text-5xl">
            환율 계산기
          </h1>
          <p class="mt-4 text-slate-400">
            원화와 외화는 물론 외화끼리도 간편하게 계산할 수 있습니다.
          </p>

          {% if error %}
          <div
            class="mt-8 rounded-2xl border border-red-400/20 bg-red-400/10 p-6 text-red-100"
            role="alert"
          >
            {{ error }}
          </div>
          {% else %}
          <section
            class="mt-10 rounded-3xl border border-white/10 bg-white/[0.07] p-5 shadow-2xl backdrop-blur sm:p-8"
          >
            <div class="grid gap-4 sm:grid-cols-[1fr_auto_1fr] sm:items-end">
              <div>
                <label
                  for="fromCurrency"
                  class="mb-2 block text-sm font-semibold text-slate-300"
                  >보내는 통화</label
                >
                <select
                  id="fromCurrency"
                  class="w-full rounded-xl border border-white/10 bg-slate-900 px-4 py-3.5 text-white outline-none focus:border-emerald-400"
                >
                  {% for currency in currencies %}
                  <option value="{{ currency['code'] }}">
                    {{ currency["code"] }} · {{ currency["name"] }}
                  </option>
                  {% endfor %}
                </select>
              </div>

              <button
                id="swapButton"
                type="button"
                class="mx-auto grid h-11 w-11 place-items-center rounded-full border border-white/10 bg-white/10 text-lg transition hover:border-emerald-400/40 hover:bg-emerald-400/10"
                aria-label="통화 위치 바꾸기"
              >
                ⇄
              </button>

              <div>
                <label
                  for="toCurrency"
                  class="mb-2 block text-sm font-semibold text-slate-300"
                  >받는 통화</label
                >
                <select
                  id="toCurrency"
                  class="w-full rounded-xl border border-white/10 bg-slate-900 px-4 py-3.5 text-white outline-none focus:border-emerald-400"
                >
                  {% for currency in currencies %}
                  <option value="{{ currency['code'] }}">
                    {{ currency["code"] }} · {{ currency["name"] }}
                  </option>
                  {% endfor %}
                </select>
              </div>
            </div>

            <div class="mt-7">
              <label
                for="amountInput"
                class="mb-2 block text-sm font-semibold text-slate-300"
                >금액</label
              >
              <div class="relative">
                <input
                  id="amountInput"
                  type="text"
                  value="100"
                  inputmode="decimal"
                  pattern="[0-9]*[.]?[0-9]*"
                  autocomplete="off"
                  class="w-full rounded-2xl border border-white/10 bg-slate-900/80 px-5 py-5 pr-20 text-2xl font-black tabular-nums outline-none focus:border-emerald-400 focus:ring-4 focus:ring-emerald-400/10"
                />
                <span
                  id="amountCode"
                  class="absolute right-5 top-1/2 -translate-y-1/2 text-sm font-bold text-slate-500"
                  >USD</span
                >
              </div>
            </div>

            <div class="mt-6 rounded-2xl bg-emerald-400 p-6 text-slate-950">
              <p class="text-sm font-bold text-emerald-950/70">계산 결과</p>
              <p
                id="resultValue"
                class="mt-2 break-all text-3xl font-black tabular-nums sm:text-4xl"
              >
                -
              </p>
              <p
                id="rateDescription"
                class="mt-3 text-sm font-semibold text-emerald-950/70"
              ></p>
            </div>

            <div
              class="mt-6 flex flex-col gap-1 text-xs leading-5 text-slate-500 sm:flex-row sm:justify-between"
            >
              <p>기준일 {{ date }} · 한국수출입은행 매매기준율</p>
              <p>실제 거래 환율과 수수료는 금융기관별로 다를 수 있습니다.</p>
            </div>
          </section>
          {% endif %}
        </div>
      </main>
    </div>

    {% if not error %}
    <script id="currencyData" type="application/json">
      {{ currencies | tojson }}
    </script>
    <script>
      const currencyData = document.getElementById("currencyData");
      const currencies = JSON.parse(currencyData.textContent);
      const rates = Object.fromEntries(
        currencies.map((currency) => [currency["code"], currency["rate"]]),
      );
      const fromCurrency = document.getElementById("fromCurrency");
      const toCurrency = document.getElementById("toCurrency");
      const amountInput = document.getElementById("amountInput");
      const amountCode = document.getElementById("amountCode");
      const resultValue = document.getElementById("resultValue");
      const rateDescription = document.getElementById("rateDescription");
      const swapButton = document.getElementById("swapButton");

      fromCurrency.value = "USD";
      toCurrency.value = "KRW";

      function formatNumber(value) {
        return new Intl.NumberFormat("ko-KR", {
          maximumFractionDigits: 4,
        }).format(value);
      }

      function calculate() {
        const amount = Number(amountInput.value);
        const from = fromCurrency.value;
        const to = toCurrency.value;
        const crossRate = rates[from] / rates[to];

        amountCode.textContent = from;

        if (
          amountInput.value.trim() === "" ||
          !Number.isFinite(amount) ||
          amount < 0
        ) {
          resultValue.textContent = "올바른 금액을 입력하세요.";
          rateDescription.textContent = "";
          return;
        }

        resultValue.textContent = `${formatNumber(amount * crossRate)} ${to}`;
        rateDescription.textContent = `1 ${from} = ${formatNumber(crossRate)} ${to}`;
      }

      [fromCurrency, toCurrency].forEach((element) =>
        element.addEventListener("input", calculate),
      );
      amountInput.addEventListener("input", () => {
        let value = amountInput.value.replace(/[^0-9.]/g, "");
        const [integerPart, ...decimalParts] = value.split(".");

        if (decimalParts.length > 0) {
          value = `${integerPart}.${decimalParts.join("")}`;
        }

        amountInput.value = value;
        calculate();
      });
      swapButton.addEventListener("click", () => {
        const previousFrom = fromCurrency.value;
        fromCurrency.value = toCurrency.value;
        toCurrency.value = previousFrom;
        calculate();
      });

      calculate();
    </script>
    {% endif %}
  </body>
</html>
